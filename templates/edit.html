{% extends 'base.html' %}
{% block content %}
<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card p-4 shadow-sm border-0 rounded-4">
                <h3 class="fw-bold text-primary mb-4">✏️ تعديل المقال الأكاديمي</h3>
                <form action="{{ url_for('edit_article', id=article.id) }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold fs-5">عنوان المقال:</label>
                        <input type="text" name="title" class="form-control form-control-lg" value="{{ article.title }}" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold fs-5">المحتوى الأكاديمي:</label>
                        <textarea name="content" id="editor" rows="12" class="form-control" required>{{ article.content }}</textarea>
                    </div>
                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-success fw-bold px-5 py-2 fs-5 rounded-pill shadow-sm">💾 حفظ التحديثات</button>
                        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary fw-bold px-5 py-2 fs-5 rounded-pill">إلغاء</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.ckeditor.com/4.21.0/standard/ckeditor.js"></script>
<script>
    CKEDITOR.replace('editor', {
        language: 'ar',
        contentsLangDirection: 'rtl'
    });
</script>
{% endblock %}
