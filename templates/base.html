<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المكتبة الرقمية الأكاديمية الذكية</title>
    <!-- Bootstrap 5 CSS العربي -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- خطوط جوجل (Tajawal) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8f9fa; color: #333; }
        .navbar { background-color: #0f2c59 !important; }
        .navbar-brand, .nav-link { color: #fff !important; }
        .hero-section { background: linear-gradient(135deg, #0f2c59, #1d5bbf); color: white; padding: 60px 0; }
        .card { border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .btn-primary { background-color: #0f2c59; border: none; }
        .btn-primary:hover { background-color: #1d5bbf; }
        .btn-back { background-color: #6c757d; color: white; border: none; }
        .btn-back:hover { background-color: #5a6268; color: white; }
        footer { background-color: #0f2c59; color: white; padding: 20px 0; margin-top: 40px; }
        .clean-output { background-color: #ffffff; border-right: 5px solid #0f2c59; padding: 20px; border-radius: 4px; white-space: pre-wrap; font-size: 1.1rem; line-height: 1.8; }
    </style>
</head>
<body>

    <!-- الشريط العلوي المشترك -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">📚 المكتبة الرقمية الأكاديمية</a>
            <button class="navbar-expand shadow-none border-0 d-lg-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}">الرئيسية</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold text-warning" href="{{ url_for('tools_menu') }}">🛠️ الأدوات البحثية</a></li>
                    {% if session.get('is_admin') %}
                        <li class="nav-item"><a class="nav-link btn btn-danger btn-sm text-white px-3 mx-2" href="{{ url_for('admin_dashboard') }}">لوحة التحكم</a></li>
                        <li class="nav-item"><a class="nav-link text-light text-decoration-underline" href="{{ url_for('logout') }}">تسجيل الخروج</a></li>
                    {% else %}
                        <li class="nav-item"><a class="nav-link" href="{{ url_for('login') }}">بوابة الأدمن</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <!-- محتوى الصفحات الفرعية الديناميكي -->
    <div class="container my-4" style="min-height: 75vh;">
        {% block content %}{% endblock %}
    </div>

    <!-- الفوتر المشترك -->
    <footer class="text-center">
        <div class="container">
            <p class="mb-0">جميع الحقوق محفوظة © المنصة الأكاديمية الذكية لدعم الباحثين - 2026</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
